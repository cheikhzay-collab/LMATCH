<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport & Mobile ─────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── SEO & Description ──────────────────────────────────────────── -->

    <meta name="description" content="La plateforme SRS gamifiée pour préparer les concours de médecine au Maroc. Révise intelligemment avec L'CONQ." />
    <meta name="keywords" content="concours médecine, Maroc, SRS, QCM, révision, prépa médecine" />
    <meta name="author" content="L'CONQ" />

    <!-- ── PWA / Manifest ─────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#5254F0" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#5254F0" media="(prefers-color-scheme: light)" />

    <!-- ── iOS PWA (Safari) ───────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="L'CONQ" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />

    <!-- iOS Splash Screens (portrait) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- ── Android / Chrome ───────────────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="L'CONQ" />

    <!-- ── Microsoft Tiles ────────────────────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#5254F0" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- ── Open Graph (sharing) ───────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="L'CONQ — Prépare ton Concours Médecine" />
    <meta property="og:description" content="La plateforme SRS gamifiée pour les concours de médecine au Maroc. Conçue par L'CONQ." />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- ── Favicon ────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />

    <!-- ── Google Fonts & Web Fonts ───────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=STIX+Two+Text:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/gh/dreampulse/computer-modern-web-font@master/fonts.css" rel="stylesheet" />

    <!-- ── Splash Screen style (instant, before React loads) ─────────── -->
    <style>
      /* Hide body until React mounts to avoid FOUC */
      body { margin: 0; background: #0D1117; }

      /* Splash screen shown before #root is hydrated */
      #splash {
        position: fixed;
        inset: 0;
        background: #0D1117;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, transform 0.5s ease;
      }
      #splash.hidden {
        opacity: 0;
        transform: scale(1.05);
        pointer-events: none;
      }
      #splash svg {
        width: 80px;
        height: auto;
        animation: splashPulse 1.8s ease-in-out infinite;
        filter: drop-shadow(0 0 24px rgba(82, 84, 240, 0.6));
      }
      #splash-name {
        margin-top: 1.5rem;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 1.6rem;
        font-weight: 900;
        letter-spacing: -0.02em;
        color: rgba(255,255,255,0.9);
      }
      #splash-name .brand-accent {
        background: linear-gradient(135deg, #818cf8, #34d399);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      #splash-tagline {
        margin-top: 0.4rem;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 0.78rem;
        color: rgba(255,255,255,0.35);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      #splash-dots {
        margin-top: 2.5rem;
        display: flex;
        gap: 0.4rem;
      }
      #splash-dots span {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #5254F0;
        animation: dotBounce 1.2s ease-in-out infinite;
      }
      #splash-dots span:nth-child(2) { animation-delay: 0.15s; }
      #splash-dots span:nth-child(3) { animation-delay: 0.30s; }

      @keyframes splashPulse {
        0%, 100% { transform: scale(1);    opacity: 1; }
        50%       { transform: scale(1.06); opacity: 0.85; }
      }
      @keyframes dotBounce {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
        40%           { transform: scale(1.2); opacity: 1; }
      }
    </style>
  </head>

  <body>
    <!-- ── Splash Screen (visible before React mounts) ──────────────── -->
    <div id="splash">
      <!-- Inline SVG logo for zero-latency display -->
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="url(#splashBrainGrad)" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="splashBrainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#818CF8" />
            <stop offset="100%" stop-color="#34D399" />
          </linearGradient>
        </defs>
        <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" />
        <path d="M9 13a4.5 4.5 0 0 0 3-4" />
        <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5" />
        <path d="M3.477 10.896a4 4 0 0 1 .585-.396" />
        <path d="M6 18a4 4 0 0 1-1.967-.516" />
        <path d="M12 13h4" />
        <path d="M12 18h6a2 2 0 0 1 2 2v1" />
        <path d="M12 8h8" />
        <path d="M16 8V5a2 2 0 0 1 2-2" />
        <circle cx="16" cy="13" r="0.6" fill="#34D399" stroke="none" />
        <circle cx="18" cy="3" r="0.6" fill="#818CF8" stroke="none" />
        <circle cx="20" cy="21" r="0.6" fill="#34D399" stroke="none" />
        <circle cx="20" cy="8" r="0.6" fill="#818CF8" stroke="none" />
      </svg>
      <div id="splash-name">L'<span class="brand-accent">CONQ</span></div>
      <div id="splash-tagline">Concours Médecine · Maroc</div>
      <div id="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- ── React root ─────────────────────────────────────────────────── -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- ── Hide splash once React is ready ───────────────────────────── -->
    <script>
      // Hide splash screen as soon as the page is interactive
      window.addEventListener('DOMContentLoaded', () => {
        const splash = document.getElementById('splash');
        // Give React a moment to mount (200ms buffer)
        const hideSplash = () => {
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(() => splash.remove(), 600);
          }
        };
        // Fallback: always hide after 3s max
        const fallback = setTimeout(hideSplash, 3000);
        // Primary: hide when React signals it's ready
        window.__hideSplash = () => {
          clearTimeout(fallback);
          hideSplash();
        };
      });
    </script>
  </body>
</html>
