<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>L'CONQ — Impression</title>
  <style>
    body {
      background: #0D1117;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .spinner {
      position: relative;
      width: 40px;
      height: 40px;
      margin-bottom: 1.2rem;
    }
    .spinner-inner {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid rgba(82, 84, 240, 0.15);
      border-top: 3px solid #5254F0;
      animation: spin 1s linear infinite;
    }
    h3 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    p {
      margin: 0.5rem 0 0;
      color: #64748b;
      font-size: 0.85rem;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="spinner">
    <div class="spinner-inner"></div>
  </div>
  <h3>L'CONQ</h3>
  <p>Génération de votre document PDF en cours...</p>

  <script>
    (function() {
      let intervalId;
      let timeoutId;

      function checkAndPrint() {
        try {
          const html = localStorage.getItem('print_html');
          if (html) {
            localStorage.removeItem('print_html');
            
            // Clear timers immediately
            clearInterval(intervalId);
            clearTimeout(timeoutId);
            
            // Overwrite document with the target PDF/HTML
            document.open();
            document.write(html);
            document.close();
            return true;
          }
        } catch (err) {
          console.error("Error reading print HTML:", err);
        }
        return false;
      }

      // Check immediately
      if (checkAndPrint()) return;

      // Poll periodically
      intervalId = setInterval(checkAndPrint, 150);

      // Listen to storage events
      window.addEventListener('storage', function(e) {
        if (e.key === 'print_html' && e.newValue) {
          checkAndPrint();
        }
      });

      // Timeout after 15 seconds to close tab if nothing is generated
      timeoutId = setTimeout(function() {
        clearInterval(intervalId);
        try {
          window.close();
        } catch (e) {
          window.location.href = '/';
        }
      }, 15000);
    })();
  </script>
</body>
</html>
