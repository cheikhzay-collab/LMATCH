<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#1E1E38" />
      <stop offset="60%" stop-color="#0F0F23" />
      <stop offset="100%" stop-color="#070710" />
    </radialGradient>

    <!-- Brain Circuit Stroke Gradient -->
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="50%" stop-color="#A78BFA" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle Glow for background border -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#5254F0" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#34D399" stop-opacity="0.8" />
    </linearGradient>
  </defs>

  <!-- Outer Rounded Rect (Standard iOS/PWA Maskable Icon Base) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Premium Neon Ring Border -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="url(#borderGrad)" stroke-width="4" opacity="0.6" filter="url(#glow)" />
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" opacity="0.3" />

  <!-- Glassmorphic Overlay Card -->
  <rect x="64" y="64" width="384" height="384" rx="72" fill="#FFFFFF" fill-opacity="0.03" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2" />

  <!-- Brain Circuit Logo with Glow & Gradient -->
  <g transform="translate(136, 136) scale(10)" stroke="url(#brainGrad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    <!-- Brain outline paths -->
    <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" stroke-width="1.8" />
    <path d="M9 13a4.5 4.5 0 0 0 3-4" />
    <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5" />
    <path d="M3.477 10.896a4 4 0 0 1 .585-.396" />
    <path d="M6 18a4 4 0 0 1-1.967-.516" />
    
    <!-- Circuits -->
    <path d="M12 13h4" />
    <path d="M12 18h6a2 2 0 0 1 2 2v1" />
    <path d="M12 8h8" />
    <path d="M16 8V5a2 2 0 0 1 2-2" />
    
    <!-- Connection Dots (Synapses) -->
    <circle cx="16" cy="13" r="0.6" fill="#34D399" stroke="none" />
    <circle cx="18" cy="3" r="0.6" fill="#818CF8" stroke="none" />
    <circle cx="20" cy="21" r="0.6" fill="#34D399" stroke="none" />
    <circle cx="20" cy="8" r="0.6" fill="#818CF8" stroke="none" />
  </g>
</svg>