server {
    listen 80;
    server_name localhost;

    # ── index.html: NEVER cache — ensures users always get the latest app ──
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── manifest + service worker: short cache so updates propagate quickly ──
    location ~* \.(webmanifest|json)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=86400"; # 1 day
        try_files $uri =404;
    }

    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Hashed assets (JS/CSS/fonts): safe to cache 1 year (hash changes on rebuild) ──
    location ~* \.(js|css|woff|woff2|ttf|otf|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA routing: all unmatched paths → index.html ──
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # Force Facebook/Instagram in-app browser to open in system browser
        if ($http_user_agent ~* "(FBAN|FBAV|Instagram)") {
            add_header Content-Disposition 'attachment; filename="redirect.html"';
        }

        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
